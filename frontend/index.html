<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Basic Info -->
    <title>LambChat</title>
    <meta
      name="description"
      content="Enterprise-grade AI Agent Platform based on LangGraph, supporting sandbox environment, MCP tool integration, skill system, and streaming conversations"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#1c1917"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LambChat" />
    <meta
      property="og:description"
      content="Enterprise-grade AI Agent Platform based on LangGraph, supporting sandbox environment, MCP tool integration, skill system, and streaming conversations"
    />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="LambChat" />
    <meta
      name="twitter:description"
      content="Enterprise-grade AI Agent Platform based on LangGraph, supporting sandbox environment, MCP tool integration, skill system, and streaming conversations"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
